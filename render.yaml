services:
  - type: web
    name: stickrpg
    runtime: node
    plan: starter
    region: virginia
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    maxShutdownDelaySeconds: 60
    envVars:
      - key: PORT
        value: "10000"
      - key: WORLD_LAYOUT_PATH
        value: /var/data/stickrpg/world-layout.json
      - key: WORLD_LAYOUT_SEED_PATH
        value: server/data/world-layout.json
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_NPC_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TIMEOUT_MS
        value: "12000"
    disk:
      name: world-data
      mountPath: /var/data/stickrpg
      sizeGB: 10
