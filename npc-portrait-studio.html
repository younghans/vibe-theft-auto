<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NPC Portrait Studio</title>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Georgia, "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at top, rgba(244, 195, 80, 0.18), transparent 26%),
          linear-gradient(180deg, #162232, #0b1017 52%, #06090d);
        color: #f6efe1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: transparent;
      }

      .portrait-studio {
        width: min(1400px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .portrait-studio__hero {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
        padding: 20px 22px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(7, 11, 18, 0.74);
        backdrop-filter: blur(10px);
      }

      .portrait-studio__eyebrow {
        margin: 0 0 8px;
        color: #f2c871;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .portrait-studio__hero h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 46px);
        line-height: 0.98;
      }

      .portrait-studio__copy {
        max-width: 820px;
        margin: 0;
        line-height: 1.5;
        color: rgba(246, 239, 225, 0.88);
      }

      .portrait-studio__controls--hero {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 18px;
      }

      .portrait-studio__hero-note {
        margin: 14px 0 0;
        color: rgba(246, 239, 225, 0.74);
        line-height: 1.45;
      }

      .portrait-studio__actions {
        display: grid;
        gap: 10px;
        justify-items: end;
      }

      .portrait-studio__meta {
        color: rgba(246, 239, 225, 0.7);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .portrait-studio__meta--error {
        color: #ffb4b4;
      }

      .portrait-studio__batch-failures {
        display: grid;
        gap: 6px;
        width: min(360px, 100%);
        max-height: 180px;
        overflow: auto;
        padding: 10px 12px;
        border: 1px solid rgba(255, 180, 180, 0.22);
        background: rgba(84, 18, 18, 0.28);
      }

      .portrait-studio__batch-failure {
        font-size: 12px;
        line-height: 1.4;
        color: #ffd1d1;
      }

      .portrait-studio__grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .portrait-studio__card {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background:
          radial-gradient(circle at top, rgba(242, 200, 113, 0.1), transparent 28%),
          rgba(9, 14, 21, 0.88);
      }

      .portrait-studio__frame {
        aspect-ratio: 1;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background:
          radial-gradient(circle at top, rgba(255, 220, 160, 0.14), transparent 22%),
          linear-gradient(180deg, #151c26, #090d13 64%);
      }

      .portrait-studio__image,
      .portrait-studio__placeholder {
        width: 100%;
        height: 100%;
      }

      .portrait-studio__image {
        display: block;
        object-fit: cover;
      }

      .portrait-studio__placeholder {
        display: grid;
        place-items: center;
        padding: 18px;
        color: #f6e7bf;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
      }

      .portrait-studio__card-body {
        display: grid;
        gap: 8px;
      }

      .portrait-studio__card-body h2 {
        margin: 0 0 4px;
        font-size: 24px;
        line-height: 1;
      }

      .portrait-studio__card-body p {
        margin: 0;
        color: rgba(246, 239, 225, 0.82);
      }

      .portrait-studio__card-body code,
      .portrait-studio__copy code {
        padding: 2px 6px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff1c7;
      }

      .portrait-studio__status {
        min-height: 2.6em;
        font-size: 13px;
        line-height: 1.4;
      }

      .portrait-studio__status.is-error {
        color: #ffb4b4;
      }

      .portrait-studio__card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .portrait-studio__controls {
        display: grid;
        gap: 10px;
      }

      .portrait-studio__control {
        display: grid;
        gap: 6px;
      }

      .portrait-studio__control-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(246, 239, 225, 0.82);
      }

      .portrait-studio__slider {
        width: 100%;
      }

      .portrait-studio__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(180deg, rgba(242, 200, 113, 0.22), rgba(242, 200, 113, 0.12));
        color: #fff2cd;
        font: inherit;
        cursor: pointer;
      }

      .portrait-studio__button--secondary {
        background: rgba(255, 255, 255, 0.06);
        color: #f6efe1;
      }

      .portrait-studio__button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      @media (max-width: 900px) {
        .portrait-studio {
          width: calc(100vw - 24px);
          padding-top: 12px;
        }

        .portrait-studio__hero {
          grid-template-columns: 1fr;
          display: grid;
        }

        .portrait-studio__actions {
          justify-items: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="portrait-studio" data-npc-portrait-studio></main>
    <script type="module" src="./src/tools/npcPortraitStudio.js"></script>
  </body>
</html>
