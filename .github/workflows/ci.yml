name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build, validate, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/mixamo-optimizer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install optimizer dependencies
        run: npm --prefix tools/mixamo-optimizer ci

      - name: Build frontend and backend
        run: npm run build:all

      - name: Run validators
        run: npm run validate:all

      - name: Audit root dependencies
        run: npm audit --audit-level=moderate

      - name: Audit optimizer dependencies
        run: npm --prefix tools/mixamo-optimizer audit --audit-level=moderate
