name: Bug report
description: Report a reproducible problem in Vibe Theft Auto.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that triggers the issue.
      placeholder: |
        1. Start the app with npm run dev
        2. Join the city
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser or runtime
      placeholder: Chrome 124, Node 22, Windows 11

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: text
